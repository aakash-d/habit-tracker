info:
  name: Set Day note
  type: http
  seq: 1

http:
  method: PUT
  url: http://localhost:8080/api/day-notes
  body:
    type: json
    data: |-
      {
        "date": "2026-06-30",
      //   "note": "Great day!"
        "note": "" // empty string
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
